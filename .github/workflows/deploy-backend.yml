name: Deploy Backend to Railway

on:
  push:
    branches: [ main ]
    paths: 
      - 'backend/**'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      
      - name: Setup Node.js 18
        uses: actions/setup-node@v3
        with:
          node-version: '18'
          cache: 'npm'
          cache-dependency-path: 'backend/package-lock.json'
      
      - name: Install dependencies
        run: |
          cd backend
          npm ci
      
      - name: Lint code
        run: |
          cd backend
          npm run lint || true
      
      - name: Run tests
        run: |
          cd backend
          npm test || true
      
      - name: Build application
        run: |
          cd backend
          npm run build || true
      
      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          NODE_ENV: production
        run: |
          # Install Railway CLI
          npm install -g @railway/cli
          
          # Login to Railway
          railway login --token $RAILWAY_TOKEN
          
          # Link to project (use Railway project from environment)
          railway link ${{ secrets.RAILWAY_PROJECT_ID }} || true
          
          # Deploy
          cd backend
          railway up
      
      - name: Notify deployment
        if: success()
        run: |
          echo "✅ Backend deployed successfully to Railway"
          echo "Backend URL: https://${{ secrets.RAILWAY_BACKEND_DOMAIN }}"
      
      - name: Notify failure
        if: failure()
        run: |
          echo "❌ Deployment failed - check Railway logs"
